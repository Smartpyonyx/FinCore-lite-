version: "3.8"

services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fincore-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://fincore:fincore_secret@db:5432/fincore_lite
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-fincore-change-me-in-production}
      - DEBUG=false
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    networks:
      - fincore-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 512M

  db:
    image: postgres:16-alpine
    container_name: fincore-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=fincore
      - POSTGRES_PASSWORD=fincore_secret
      - POSTGRES_DB=fincore_lite
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d
    networks:
      - fincore-network
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "effective_cache_size=1536MB"
      - "-c"
      - "work_mem=2621kB"

  redis:
    image: redis:7-alpine
    container_name: fincore-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - fincore-network
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

  nginx:
    image: nginx:alpine
    container_name: fincore-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - app
    networks:
      - fincore-network

volumes:
  postgres_data:
  redis_data:

networks:
  fincore-network:
    driver: bridge
